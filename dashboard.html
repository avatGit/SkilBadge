<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillBadge — Redirection</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuration des couleurs -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .spinner {
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-screen flex items-center justify-center p-4">

  <!-- Container de redirection -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 text-center fade-in">
    
    <!-- Logo -->
    <div class="w-16 h-16 bg-gradient-to-br from-primary-600 to-primary-700 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
      <span class="text-3xl font-bold text-white">SB</span>
    </div>

    <!-- État : Chargement -->
    <div id="loading-state">
      <div class="spinner mx-auto mb-4"></div>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Vérification en cours…</h2>
      <p class="text-gray-600 text-sm">Nous préparons votre espace personnel.</p>
    </div>

    <!-- État : Erreur -->
    <div id="error-state" class="hidden">
      <div class="w-16 h-16 bg-red-100 rounded-full mx-auto mb-4 flex items-center justify-center">
        <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Oups !</h2>
      <p id="error-message" class="text-gray-600 text-sm mb-4">Une erreur est survenue.</p>
      <a href="login.html" class="inline-block px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition text-sm">
        Retour à la connexion
      </a>
    </div>

    <!-- État : Redirection (affiché brièvement) -->
    <div id="redirect-state" class="hidden">
      <div class="w-16 h-16 bg-green-100 rounded-full mx-auto mb-4 flex items-center justify-center">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Bienvenue<span id="user-name"></span> !</h2>
      <p class="text-gray-600 text-sm">Redirection vers votre espace <span id="user-role" class="font-semibold text-primary-600"></span>…</p>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script type="module">
    // Imports Firebase (CDN)
    import { auth, db } from './js/firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
    import { ref } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // Éléments DOM
    const loadingState = document.getElementById('loading-state');
    const errorState = document.getElementById('error-state');
    const redirectState = document.getElementById('redirect-state');
    const errorMessage = document.getElementById('error-message');
    const userNameEl = document.getElementById('user-name');
    const userRoleEl = document.getElementById('user-role');

    // Fonction de redirection
    function redirigerSelonRole(profil) {
      const routes = {
        'formateur': 'formateur.html',
        'apprenant': 'portfolio.html',
        'recruteur': 'verify.html'
      };

      const target = routes[profil.role];
      
      if (target) {
        // Afficher l'état de redirection
        loadingState.classList.add('hidden');
        redirectState.classList.remove('hidden');
        userNameEl.textContent = `, ${profil.nom.split(' ')[0]}`;
        userRoleEl.textContent = profil.role;
        
        // Rediriger après un court délai pour l'UX
        setTimeout(() => {
          window.location.href = target;
        }, 1200);
      } else {
        showError('Rôle non reconnu. Veuillez contacter le support.');
      }
    }

    // Fonction d'erreur
    function showError(message) {
      loadingState.classList.add('hidden');
      errorState.classList.remove('hidden');
      errorMessage.textContent = message;
    }

    // Observer l'état de connexion
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          // Récupérer le profil depuis Firebase
          const snapshot = await get(ref(db, `utilisateurs/${user.uid}`));
          
          if (snapshot.exists()) {
            const profil = snapshot.val();
            redirigerSelonRole({ ...profil, uid: user.uid });
          } else {
            showError('Profil utilisateur introuvable.');
          }
        } catch (error) {
          console.error('Erreur de récupération du profil:', error);
          showError('Impossible de charger votre profil. Réessayez.');
        }
      } else {
        // Utilisateur non connecté → redirect vers login
        window.location.href = 'login.html';
      }
    });
  </script>

</body>
</html>

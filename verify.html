<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBadge — Vérification publique</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 500: "#3b82f6", 600: "#2563eb", 700: "#1d4ed8" }
          }
        }
      }
    };
  </script>
  <style>
    .hex-badge-verify {
      width: 64px;
      height: 64px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--hex-bg, #334155);
    }
    .spinner-verify {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin-verify 1s linear infinite;
    }
    @keyframes spin-verify {
      to { transform: rotate(360deg); }
    }
  </style>
  <!-- Ethers global requis par js/web3.js (chaîne d’imports badges → web3) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 p-6">
  <header class="max-w-3xl mx-auto mb-8 flex items-center justify-between">
    <a href="login.html" class="text-primary-500 hover:underline text-sm font-medium">SkillBadge</a>
    <span class="text-slate-500 text-xs">Lecture seule</span>
  </header>
  <main id="verify-root" class="max-w-3xl mx-auto"></main>
  <script type="module" src="js/verify-page.js"></script>
</body>
</html>
